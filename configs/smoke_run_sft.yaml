model:
  name_or_path: "./checkpoints/smoke_stage1_cpt"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

data:
  dataset_path: "./data/smoke_sft_tool_use"
  max_seq_length: 512

training:
  output_dir: "./checkpoints/smoke_stage2_sft"
  dataloader_num_workers: 0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 1
  max_steps: 10
  save_steps: 5
  logging_steps: 1
  bf16: true
  gradient_checkpointing: true
  deepspeed: null
