# Stage 1d: CPT-SFT on curated tool/trace data (same mix as Stage 2 for mini pipeline)
model:
  name_or_path: "./checkpoints/qwen3_moe_cpt_phase2"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

data:
  dataset_path: "./data/sft_tool_use"
  max_seq_length: 8192

training:
  output_dir: "./checkpoints/qwen3_moe_cpt_phase3_sft"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 1
  max_steps: 800
  save_steps: 200
  logging_steps: 5
  bf16: true
  gradient_checkpointing: true
  deepspeed: null
