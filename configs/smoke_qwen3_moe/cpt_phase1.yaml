# Tiny CPT phase 1 for smoke (default model: public MoE small enough for CI)
model:
  name_or_path: "Qwen/Qwen1.5-MoE-A2.7B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

data:
  dataset_name: "bigcode/starcoderdata"
  fallback_dataset: "wikitext"
  fallback_dataset_config: "wikitext-103-raw-v1"
  fallback_text_column: "text"
  languages: ["python"]
  max_seq_length: 256
  streaming: true

training:
  output_dir: "./checkpoints/smoke_qwen3_moe/cpt_phase1"
  optim: "adamw_bnb_8bit"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 1
  max_steps: 3
  save_steps: 3
  logging_steps: 1
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 0
  deepspeed: null
