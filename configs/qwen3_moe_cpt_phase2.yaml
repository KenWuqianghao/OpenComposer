# Stage 1b: long-context extension (target 16k; YARN-style scaling — tune for your HF config)
model:
  name_or_path: "./checkpoints/qwen3_moe_cpt_phase1"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"
  max_position_embeddings: 16384
  rope_scaling:
    rope_type: "yarn"
    factor: 4.0
    original_max_position_embeddings: 4096
    finetune: true

data:
  dataset_name: "bigcode/starcoderdata"
  fallback_dataset: "wikitext"
  fallback_dataset_config: "wikitext-103-raw-v1"
  fallback_text_column: "text"
  languages: ["python", "javascript", "typescript"]
  max_seq_length: 4096
  streaming: true

training:
  output_dir: "./checkpoints/qwen3_moe_cpt_phase2"
  optim: "adamw_bnb_8bit"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 48
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.02
  num_train_epochs: 1
  max_steps: 1000
  save_steps: 200
  logging_steps: 5
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 0
  deepspeed: "configs/deepspeed_zero3_offload.json"
