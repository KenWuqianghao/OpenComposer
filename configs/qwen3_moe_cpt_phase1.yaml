# Stage 1a: short-sequence CPT (Composer 2 mini) — Qwen3-Coder MoE
model:
  name_or_path: "Qwen/Qwen3-Coder-30B-A3B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

data:
  dataset_name: "bigcode/starcoderdata"
  fallback_dataset: "wikitext"
  fallback_dataset_config: "wikitext-103-raw-v1"
  fallback_text_column: "text"
  languages: ["python", "javascript", "typescript", "go", "rust"]
  max_seq_length: 2048
  streaming: true

training:
  output_dir: "./checkpoints/qwen3_moe_cpt_phase1"
  optim: "adamw_bnb_8bit"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 1
  max_steps: 5000
  save_steps: 500
  logging_steps: 10
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 0
  deepspeed: null
