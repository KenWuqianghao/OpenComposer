# Short CPT run for CI / low free-VRAM (pair with deepspeed_zero3_offload.json)
model:
  name_or_path: "THUDM/glm-4-9b-chat"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

data:
  dataset_name: "bigcode/starcoderdata"
  fallback_dataset: "wikitext"
  fallback_dataset_config: "wikitext-103-raw-v1"
  fallback_text_column: "text"
  languages: ["python"]
  max_seq_length: 512
  streaming: true
  num_proc: 2

training:
  output_dir: "./checkpoints/stage1_cpt"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 1
  max_steps: 8
  save_steps: 4
  logging_steps: 1
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 0
  deepspeed: "configs/deepspeed_zero2_nooffload.json"
